<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Choose your mood to get personalized movie and TV recommendations tailored to how you want to feel tonight with Film Discovery.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0A0A0C">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Film Discovery">
    <meta property="og:title" content="Select Your Mood - Film Discovery">
    <meta property="og:description" content="Choose your mood to get personalized movie and TV recommendations tailored to how you want to feel tonight with Film Discovery.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Select Your Mood - Film Discovery">
    <meta name="twitter:description" content="Choose your mood to get personalized movie and TV recommendations tailored to how you want to feel tonight with Film Discovery.">
    <title>Select Your Mood - Film Discovery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-mood">
    <!-- Header/Navigation -->
    <header>
        <div class="logo">Film Discovery</div>
        <button type="button" class="nav-toggle" id="navToggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="siteNav">
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
        </button>
        <nav id="siteNav" class="site-nav">
            <a href="index.html">Home</a>
            <a href="mood.html" class="active">Mood</a>
            <a href="discovery.html">Browse</a>
            <a href="group.html">Group Watch</a>
        </nav>
        <div class="header-actions">
            <input type="text" class="search-box" id="searchBox" placeholder="Search...">
            <button type="button" class="theme-toggle" id="themeToggle" aria-label="Activate light theme" aria-pressed="false">
                <span class="theme-toggle-option">Dark</span>
                <span class="theme-toggle-option">Light</span>
                <span class="theme-toggle-thumb" aria-hidden="true"></span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="mood-stage">
            <div class="mood-collage-shell" aria-hidden="true">
                <div class="mood-collage" id="moodCollage"></div>
            </div>

            <div class="container">
                <!-- Hero Section -->
                <section class="hero mood-hero">
                    <div class="hero-content">
                        <h1>How Are You Feeling Tonight?</h1>
                        <p>Choose a mood that best describes how you're feeling to get personalized recommendations.</p>
                    </div>
                </section>

                <!-- Mood Selection Grid -->
                <div class="mood-grid" id="moodGrid">
                    <!-- Populated by JavaScript -->
                </div>

                <!-- Surprise Me Button -->
                <div style="text-align: center; margin-bottom: var(--spacing-xl);">
                <button class="btn btn-secondary" id="surpriseBtn">Surprise Me — Pick a random mood</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Film Discovery. All rights reserved. | <a href="#about">About Us</a> | <a href="#contact">Contact</a> | <a href="#privacy">Privacy Policy</a></p>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
